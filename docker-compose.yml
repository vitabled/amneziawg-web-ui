services:
  amnezia-web-ui:
    image: alexishw/amneziawg-web-ui:master
    container_name: amnezia-web-ui

    cap_add:
      - NET_ADMIN
      - SYS_MODULE

    sysctls:
      net.ipv4.ip_forward: "1"
      net.ipv4.conf.all.src_valid_mark: "1"
      net.ipv6.conf.all.disable_ipv6: "0"
      net.ipv6.conf.all.forwarding: "1"
      net.ipv6.conf.default.forwarding: "1"

    devices:
      - /dev/net/tun:/dev/net/tun

    restart: unless-stopped

    ports:
      - "127.0.0.1:9090:80/tcp"
      - "51821:51821/udp"

    environment:
      NGINX_PORT: "80"
      NGINX_USER: "1Jp0gi97XCfjEJitqhRk"
      NGINX_PASSWORD: "R1dQdL628GswPHhQD1MmVvYRsf1EqivG"
      AUTO_START_SERVERS: "false"
      DEFAULT_MTU: "1420"
      DEFAULT_SUBNET: "10.8.5.0/24"
      DEFAULT_PORT: "51821"
      DEFAULT_DNS: "8.8.8.8,8.8.4.4"
      SSL_EMAIL: "test@email.com"
      SSL_DOMAIN: "amneziapanel.ordinarysiteforcoud.uk"

    volumes:
      - amnezia-data:/etc/amnezia
      - ssl:/etc/letsencrypt

volumes:
  amnezia-data:
  ssl:

networks:
  remnawave-network:
    external: true
